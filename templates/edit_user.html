<!-- templates/edit_user.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Edit User</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <!-- Bootstrap 5 CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow-lg">
                <div class="card-header bg-primary text-white text-center">
                    <h4>Edit User</h4>
                </div>
                <div class="card-body">
                    <form method="POST" action="{{ url_for('update_user', user_id=user.id) }}" enctype="multipart/form-data">
                        <!-- Avatar Section -->
                        <div class="mb-4 text-center">
                            <label for="avatar" class="form-label fw-bold">Ảnh đại diện:</label>
                            <div class="mb-3">
                                {% if user.avatar_path %}
                                    <img src="/static/{{ user.avatar_path }}" alt="Current Avatar" 
                                         id="avatarPreview" class="rounded-circle border border-3 border-primary shadow-sm" 
                                         style="width: 120px; height: 120px; object-fit: cover; cursor: pointer;"
                                         onclick="document.getElementById('avatar').click()" />
                                {% else %}
                                    <div id="avatarPreview" class="rounded-circle border border-3 border-secondary d-inline-flex align-items-center justify-content-center bg-light shadow-sm" 
                                         style="width: 120px; height: 120px; cursor: pointer;"
                                         onclick="document.getElementById('avatar').click()">
                                        <i class="bi bi-camera fs-1 text-muted"></i>
                                    </div>
                                {% endif %}
                            </div>
                            <input type="file" id="avatar" name="avatar" class="form-control" accept="image/*" onchange="previewAvatar(event)" style="display: none;">
                            <small class="text-muted d-block">Click vào ảnh để chọn ảnh đại diện mới</small>
                        </div>

                        <div class="mb-3">
                            <label for="username" class="form-label">Username:</label>
                            <input type="text" id="username" name="username" class="form-control" value="{{ user.username }}" required>
                        </div>

                        <div class="mb-3">
                            <label for="password" class="form-label">Password:</label>
                            <input type="password" id="password" name="password" class="form-control" placeholder="Leave blank to keep current password">
                        </div>

                        <div class="mb-3">
                            <label for="role" class="form-label">Role:</label>
                            <select id="role" name="role" class="form-select" required>
                                <option value="student" {% if user.role == 'student' %}selected{% endif %}>Student</option>
                                <option value="teacher" {% if user.role == 'teacher' %}selected{% endif %}>Teacher</option>
                            </select>
                        </div>

                        <div class="d-flex justify-content-between">
                            <button type="submit" class="btn btn-success"><i class="bi bi-check-circle me-2"></i>Update</button>
                            <a href="{{ url_for('list_users') }}" class="btn btn-secondary"><i class="bi bi-x-circle me-2"></i>Cancel</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
function previewAvatar(event) {
    const reader = new FileReader();
    reader.onload = function(e) {
        const preview = document.getElementById('avatarPreview');
        preview.innerHTML = `<img src="${e.target.result}" class="rounded-circle border border-3 border-primary shadow-sm" style="width: 120px; height: 120px; object-fit: cover;">`;
    };
    reader.readAsDataURL(event.target.files[0]);
}
</script>
</body>
</html>
