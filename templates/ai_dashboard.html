<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8">
  <title>Bảng theo dõi AI</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    body { background:#f8fafc; }
    .pill { padding:.25rem .5rem;border-radius:999px;font-weight:600; }
    .pill-good { background:#d1fae5;color:#065f46; }
    .pill-warn { background:#fef3c7;color:#92400e; }
    .pill-bad  { background:#fee2e2;color:#991b1b; }
    .table thead th { white-space:nowrap; }
    .small { font-size:.875rem; color:#6b7280; }
  </style>
</head>
<body>
<div class="container py-4">
  <div class="d-flex align-items-center mb-3">
    <h3 class="mb-0"><i class="fa-solid fa-robot me-2"></i>Bảng theo dõi AI</h3>
  </div>

  <ul class="nav nav-tabs mb-3" role="tablist">
    <li class="nav-item">
      <button class="nav-link active" data-bs-toggle="tab" data-bs-target="#overview" type="button">
        <i class="fa-solid fa-chart-line me-1"></i>Tổng quan
      </button>
    </li>
    <li class="nav-item">
      <button class="nav-link" data-bs-toggle="tab" data-bs-target="#incidents" type="button">
        <i class="fa-solid fa-exclamation-triangle me-1"></i>Chi tiết gian lận
      </button>
    </li>
  </ul>

  <div class="tab-content">
    <!-- Tab Tổng quan -->
    <div class="tab-pane fade show active" id="overview">
      <div class="card shadow-sm">
        <div class="card-body">
          <div class="row g-2 mb-3">
            <div class="col-auto">
              <label class="form-label mb-0 small">Lọc theo khóa học:</label>
              <select id="courseFilter" class="form-select">
                <option value="">Tất cả khóa học</option>
                {% for c in courses %}
                  <option value="{{ c.id }}">{{ c.title }}</option>
                {% endfor %}
              </select>
            </div>
            <div class="col-auto">
              <button id="btnRefresh" class="btn btn-primary">
                <i class="fa-solid fa-rotate me-1"></i>Nạp dữ liệu
              </button>
            </div>
          </div>

          <div class="table-responsive">
            <table class="table table-hover align-middle" id="aiTable">
              <thead>
                <tr>
                  <th>#</th>
                  <th>Học viên</th>
                  <th>Email</th>
                  <th>Khóa học</th>
                  <th>% tập trung</th>
                  <th>Gian lận (số sự kiện)</th>
                  <th>Số lần làm bài</th>
                  <th>Điểm cao nhất</th>
                  <th>Điểm TB</th>
                  <th>Phân tích hành vi</th>
                  <th>Cập nhật</th>
                </tr>
              </thead>
              <tbody></tbody>
            </table>
          </div>
        </div>
      </div>
    </div>

    <!-- Tab Chi tiết gian lận -->
    <div class="tab-pane fade" id="incidents">
      <div class="card shadow-sm">
        <div class="card-body">
          <div class="row g-2 mb-3">
            <div class="col-auto">
              <label class="form-label mb-0 small">Lọc theo khóa học:</label>
              <select id="incidentCourseFilter" class="form-select">
                <option value="">Tất cả khóa học</option>
                {% for c in courses %}
                  <option value="{{ c.id }}">{{ c.title }}</option>
                {% endfor %}
              </select>
            </div>
            <div class="col-auto">
              <label class="form-label mb-0 small">Lọc theo học viên:</label>
              <input type="number" id="incidentUserFilter" class="form-control" placeholder="User ID" style="width: 120px;">
            </div>
            <div class="col-auto">
              <button id="btnRefreshIncidents" class="btn btn-primary">
                <i class="fa-solid fa-rotate me-1"></i>Nạp dữ liệu
              </button>
            </div>
          </div>

          <div class="table-responsive">
            <table class="table table-hover align-middle" id="incidentsTable">
              <thead>
                <tr>
                  <th>#</th>
                  <th>Học viên</th>
                  <th>Khóa học</th>
                  <th>Hành vi gian lận</th>
                  <th>Loại gian lận</th>
                  <th>Ngày phát hiện</th>
                  <th>Giờ phát hiện</th>
                  <th>Độ tin cậy</th>
                  <th>Số vật thể</th>
                  <th>Hình ảnh</th>
                </tr>
              </thead>
              <tbody></tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
// Tab 1: Tổng quan
async function loadData() {
  const cid = document.getElementById('courseFilter').value || '';
  const url = '/api/ai/progress' + (cid ? ('?course_id=' + cid) : '');
  const rsp = await fetch(url);
  const data = await rsp.json();
  const tb = document.querySelector('#aiTable tbody');
  tb.innerHTML = '';

  if (!data.ok) return;

  (data.items || []).forEach((row, idx) => {
    const tr = document.createElement('tr');

    const pct = Number(row.focus_percent || 0);
    let pillClass = 'pill-bad';
    if (pct >= 80) pillClass = 'pill-good';
    else if (pct >= 60) pillClass = 'pill-warn';

    tr.innerHTML = `
      <td>${idx+1}</td>
      <td>${row.username || ''}</td>
      <td>${row.email || ''}</td>
      <td>${row.course_title || ''}</td>
      <td><span class="pill ${pillClass}">${(pct||0).toFixed(1)}%</span></td>
      <td>${row.cheat_events || 0}</td>
      <td>${row.attempt_count || 0}</td>
      <td>${(row.highest_score ?? 0)}</td>
      <td>${(row.average_score ?? 0)}</td>
      <td>${row.behavior_analysis || '—'}</td> 
      <td>${row.last_seen ? new Date(row.last_seen).toLocaleString() : ''}</td>
    `;
    tb.appendChild(tr);
  });
}

// Tab 2: Chi tiết gian lận
async function loadIncidents() {
  const cid = document.getElementById('incidentCourseFilter').value || '';
  const uid = document.getElementById('incidentUserFilter').value || '';
  let url = '/api/ai/cheating-incidents?limit=100';
  if (cid) url += '&course_id=' + cid;
  if (uid) url += '&user_id=' + uid;
  
  const rsp = await fetch(url);
  const data = await rsp.json();
  const tb = document.querySelector('#incidentsTable tbody');
  tb.innerHTML = '';

  if (!data.ok || !data.incidents) return;

  (data.incidents || []).forEach((incident, idx) => {
    const tr = document.createElement('tr');
    
    const confidence = Number(incident.confidence || 0);
    let confClass = 'pill-bad';
    if (confidence >= 0.7) confClass = 'pill-bad';
    else if (confidence >= 0.5) confClass = 'pill-warn';
    else confClass = 'pill-good';
    
    // Sử dụng screenshot_url nếu có, nếu không thì dùng screenshot_path
    const screenshotUrl = incident.screenshot_url || (incident.screenshot_path ? "/" + incident.screenshot_path.replace(/\\/g, '/') : null);
    const screenshotBtn = screenshotUrl 
      ? `<a href="${screenshotUrl}" target="_blank" class="btn btn-sm btn-outline-primary" title="Xem hình ảnh gian lận">
           <i class="fa-solid fa-image"></i> Xem
         </a>`
      : '<span class="text-muted" title="Không có hình ảnh">—</span>';
    
    tr.innerHTML = `
      <td>${idx+1}</td>
      <td>${incident.username || 'N/A'}</td>
      <td>${incident.course_title || 'N/A'}</td>
      <td><strong>${incident.cheating_reason || incident.event_type || 'N/A'}</strong></td>
      <td><span class="badge bg-secondary">${incident.cheat_type || 'unknown'}</span></td>
      <td>${incident.detected_date || incident.detected_at?.substring(0, 10) || 'N/A'}</td>
      <td>${incident.detected_time || incident.detected_at?.substring(11, 19) || 'N/A'}</td>
      <td><span class="pill ${confClass}">${(confidence * 100).toFixed(1)}%</span></td>
      <td>${incident.suspicious_count || 0}</td>
      <td>${screenshotBtn}</td>
    `;
    tb.appendChild(tr);
  });
}

document.getElementById('btnRefresh').addEventListener('click', loadData);
document.getElementById('courseFilter').addEventListener('change', loadData);
document.getElementById('btnRefreshIncidents').addEventListener('click', loadIncidents);
document.getElementById('incidentCourseFilter').addEventListener('change', loadIncidents);
document.getElementById('incidentUserFilter').addEventListener('change', loadIncidents);

// Load data khi chuyển tab
document.querySelectorAll('[data-bs-toggle="tab"]').forEach(tab => {
  tab.addEventListener('shown.bs.tab', function(e) {
    if (e.target.getAttribute('data-bs-target') === '#incidents') {
      loadIncidents();
    }
  });
});

document.addEventListener('DOMContentLoaded', () => {
  loadData();
});
</script>
</body>
</html>
