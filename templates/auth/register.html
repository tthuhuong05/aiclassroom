<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Register</title>

  <!-- Bootstrap 5 CSS -->
  <link rel="stylesheet" href="{{ url_for('static', filename='css/bootstrap.css') }}"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet"/>

  <style>
    * {
      margin: 0; padding: 0; box-sizing: border-box;
    }
    body {
      min-height: 100vh;
      background: url("{{ url_for('static', filename='bg.jpeg') }}") no-repeat center center fixed;
      background-size: cover;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: 'Poppins', sans-serif;
    }
    .register-container {
      max-width: 450px;
      width: 100%;
      margin: 40px auto;
      background: #ffffff;
      padding: 40px 35px;
      border-radius: 20px;
      box-shadow: 0 12px 35px rgba(0, 0, 0, 0.1);
    }
    .register-header {
      text-align: center;
      margin-bottom: 30px;
    }
    .form-icon {
      width: 3.5rem; height: 3.5rem;
      color: #007bff;
      margin-bottom: 15px;
    }
    .register-header h1 {
      font-size: 2.2rem;
      font-weight: 700;
      color: #1a1a1a;
      margin: 0;
    }
    .form-label {
      font-weight: 500;
      color: #333;
      margin-bottom: 8px;
    }
    .input-group {
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 2px 6px rgba(0, 0, 0, 0.05);
    }
    .input-group-text {
      background: #f0f4f8;
      border: none;
      color: #007bff;
      padding: 12px;
    }
    .form-control, .form-select {
      border: none;
      padding: 12px;
      font-size: 1rem;
      background: #f9fbfd;
      border-radius: 0 12px 12px 0;
    }
    .form-control:focus, .form-select:focus {
      background: #fff;
      box-shadow: inset 0 0 5px rgba(0, 123, 255, 0.3);
    }
    .btn-primary {
      background: linear-gradient(135deg, #007bff, #0056b3);
      border: none;
      padding: 12px;
      font-size: 1.1rem;
      font-weight: 600;
      border-radius: 12px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    .btn-primary:hover {
      background: linear-gradient(135deg, #0056b3, #003d80);
      transform: translateY(-2px);
      box-shadow: 0 5px 15px rgba(0, 123, 255, 0.4);
    }
    .login-link {
      margin-top: 25px;
      font-size: 0.95rem;
      color: #555;
    }
    .login-link a {
      color: #007bff;
      font-weight: 600;
      text-decoration: none;
      position: relative;
    }
    .login-link a::after {
      content: '';
      position: absolute;
      width: 0;
      height: 2px;
      bottom: -4px;
      left: 0;
      background-color: #007bff;
      transition: width 0.3s ease;
    }
    .login-link a:hover::after {
      width: 100%;
    }
  </style>
</head>
<body>

  <div class="register-container">
     {% with messages = get_flashed_messages(with_categories=true) %}
  {% if messages %}
    <div class="alert-container mb-3">
      {% for category, message in messages %}
        <div class="alert alert-{{ category }} alert-dismissible fade show" role="alert">
          {{ message }}
          <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>
      {% endfor %}
    </div>
  {% endif %}
{% endwith %}
    <div class="register-header">
      <i class="bi bi-person-plus-fill form-icon"></i>
      <h1>Register</h1>
    </div>

    <form method="POST" action="{{ url_for('register') }}" class="mt-4" enctype="multipart/form-data">
      
      <!-- Username -->
      <div class="mb-3">
        <label for="username" class="form-label">Username</label>
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-person"></i></span>
          <input type="text" class="form-control" id="username" name="username" placeholder="Enter your username" required>
        </div>
      </div>

      <!-- Password -->
      <div class="mb-3">
        <label for="password" class="form-label">Password</label>
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-lock-fill"></i></span>
          <input type="password" class="form-control" id="password" name="password" placeholder="Enter your password" required>
        </div>
      </div>

      <!-- Role -->
      <div class="mb-4">
        <label for="role" class="form-label">Role</label>
        <select class="form-select" id="role" name="role" required onchange="toggleInviteCodeField()">
          <option value="student">Student</option>
          <option value="teacher">Teacher</option>
        </select>
      </div>

      <!-- Invite Code (only for teachers) -->
      <div class="mb-4" id="inviteCodeField" style="display: none;">
        <label for="invite_code" class="form-label">Mã đăng ký giáo viên</label>
        <input type="text" class="form-control" id="invite_code" name="invite_code" placeholder="Nhập mã đăng ký giáo viên">
      </div>

      <!-- Avatar Upload -->
      <div class="mb-4">
        <label for="avatar" class="form-label">Hình ảnh đại diện (Tùy chọn)</label>
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-image"></i></span>
          <input type="file" class="form-control" id="avatar" name="avatar" accept="image/*" onchange="previewAvatar(this)">
        </div>
        <div class="form-text">Chấp nhận: PNG, JPG, JPEG, GIF, WEBP (Tối đa 5MB)</div>
        
        <!-- Avatar Preview -->
        <div id="avatarPreview" class="mt-2" style="display: none;">
          <img id="previewImg" src="" alt="Avatar Preview" style="width: 100px; height: 100px; object-fit: cover; border-radius: 50%; border: 2px solid #007bff;">
        </div>
      </div>

      <!-- Submit -->
      <button type="submit" class="btn btn-primary w-100">
        <i class="bi bi-person-check"></i> Register
      </button>
    </form>

    <p class="login-link text-center">
      Already have an account? <a href="{{ url_for('login') }}">Login here</a>.
    </p>
  </div>

  <!-- Bootstrap JS -->
  <script src="{{ url_for('static', filename='js/bootstrap.bundle.js') }}"></script>

  <!-- Script to toggle invite code field and preview avatar -->
  <script>
    function toggleInviteCodeField() {
      const role = document.getElementById('role').value;
      const field = document.getElementById('inviteCodeField');
      field.style.display = role === 'teacher' ? 'block' : 'none';
    }
    
    function previewAvatar(input) {
      const preview = document.getElementById('avatarPreview');
      const previewImg = document.getElementById('previewImg');
      
      if (input.files && input.files[0]) {
        const file = input.files[0];
        
        // Kiểm tra kích thước file (5MB)
        if (file.size > 5 * 1024 * 1024) {
          alert('File quá lớn! Vui lòng chọn file nhỏ hơn 5MB.');
          input.value = '';
          return;
        }
        
        // Kiểm tra định dạng file
        const allowedTypes = ['image/png', 'image/jpg', 'image/jpeg', 'image/gif', 'image/webp'];
        if (!allowedTypes.includes(file.type)) {
          alert('Định dạng file không hợp lệ! Chỉ chấp nhận: PNG, JPG, JPEG, GIF, WEBP');
          input.value = '';
          return;
        }
        
        const reader = new FileReader();
        reader.onload = function(e) {
          previewImg.src = e.target.result;
          preview.style.display = 'block';
        };
        reader.readAsDataURL(file);
      } else {
        preview.style.display = 'none';
      }
    }
    
    document.addEventListener("DOMContentLoaded", toggleInviteCodeField);
  </script>
</body>
</html>
