<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login</title>

  <!-- Bootstrap 5 CSS -->
  <link rel="stylesheet" href="{{ url_for('static', filename='css/bootstrap.css') }}">

  <!-- Bootstrap Icons -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css">

  <!-- Google Fonts: Poppins -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">

  <style>
    /* Reset và thiết lập nền */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      background: linear-gradient(rgba(0, 0, 0, 0.5), rgba(0, 0, 0, 0.5)), 
                  url('{{ url_for('static', filename='bg.jpeg') }}') no-repeat center center fixed;
      background-size: cover;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: 'Poppins', sans-serif;
    }

    /* Container chính */
    .login-container {
      max-width: 420px;
      width: 100%;
      margin: 40px auto;
      background: rgba(255, 255, 255, 0.98);
      padding: 40px 30px;
      border-radius: 20px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15);
      position: relative;
      overflow: hidden;
      transition: all 0.4s ease;
    }

    .login-container::before {
      content: '';
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: radial-gradient(circle, rgba(0, 123, 255, 0.1), transparent);
      transform: rotate(30deg);
      pointer-events: none;
    }

    .login-container:hover {
      transform: translateY(-8px);
      box-shadow: 0 15px 40px rgba(0, 0, 0, 0.25);
    }

    /* Tiêu đề */
    .login-container h1 {
      font-size: 2.2rem;
      font-weight: 700;
      color: #1a1a1a;
      margin-bottom: 30px;
      position: relative;
      z-index: 1;
    }

    .login-container h1 i {
      color: #007bff;
      transition: transform 0.3s ease;
    }

    .login-container h1:hover i {
      transform: scale(1.2);
    }

    /* Form styling */
    .form-label {
      font-weight: 500;
      color: #333;
      margin-bottom: 8px;
    }

    .input-group {
      border-radius: 10px;
      overflow: hidden;
      box-shadow: 0 2px 5px rgba(0, 0, 0, 0.05);
    }

    .input-group-text {
      background-color: #f0f4f8;
      border: none;
      color: #007bff;
      padding: 12px;
    }

    .form-control {
      border: none;
      padding: 12px;
      font-size: 1rem;
      background: #f9fbfd;
      transition: all 0.3s ease;
    }

    .form-control:focus {
      background: #fff;
      box-shadow: inset 0 0 5px rgba(0, 123, 255, 0.3);
      color: #1a1a1a;
    }

    /* Nút đăng nhập */
    .btn-primary {
      background: linear-gradient(135deg, #007bff, #0056b3);
      border: none;
      padding: 12px;
      font-size: 1.1rem;
      font-weight: 600;
      border-radius: 10px;
      text-transform: uppercase;
      letter-spacing: 1px;
      transition: all 0.3s ease;
    }

    .btn-primary:hover {
      background: linear-gradient(135deg, #0056b3, #003d80);
      transform: translateY(-2px);
      box-shadow: 0 5px 15px rgba(0, 123, 255, 0.4);
    }

    .btn-primary i {
      margin-right: 8px;
    }

    /* Liên kết đăng ký */
    .register-link {
      margin-top: 25px;
      font-size: 0.95rem;
      color: #555;
    }

    .register-link a {
      color: #007bff;
      font-weight: 600;
      text-decoration: none;
      position: relative;
    }

    .register-link a::after {
      content: '';
      position: absolute;
      width: 0;
      height: 2px;
      bottom: -4px;
      left: 0;
      background-color: #007bff;
      transition: width 0.3s ease;
    }

    .register-link a:hover::after {
      width: 100%;
    }

    .register-link a:hover {
      color: #0056b3;
    }
  </style>
</head>
<body>
  <!-- Container chính -->
  <div class="login-container">
    <!-- Tiêu đề -->
    <h1 class="text-center">
      <i class="bi bi-person-circle"></i> Login
    </h1>

    <!-- Form đăng nhập -->
    <form method="POST" action="{{ url_for('login') }}">
  <!-- Email -->
<div class="mb-3">
  <label for="email" class="form-label">Username</label>
  <div class="input-group">
    <input
      type="text"
      class="form-control"
      id="email"
      name="email"
      placeholder="Enter your username"
      required
    >
  </div>
</div>

<!-- Password -->
<div class="mb-3">
  <label for="password" class="form-label">Password</label>
  <div class="input-group">
    <input
      type="password"
      class="form-control"
      id="password"
      name="password"
      placeholder="Enter your password"
      required
    >
    <span class="input-group-text" id="togglePassword" style="cursor: pointer;">
                    <i class="bi bi-eye-slash" id="eyeIcon"></i>
                  </span>
    <!-- Link Quên mật khẩu -->
    <div class="text-end mt-2">
      <a href="{{ url_for('forgot_password') }}" class="text-decoration-none" style="font-size: 0.9rem;">
        Forgot your password?
      </a>
    </div>
  </div>

  <!-- Login Button -->
  <button type="submit" class="btn btn-primary w-100">Login</button>
</form>

    <!-- Liên kết đăng ký -->
    <p class="register-link text-center">
      Don't have an account?
      <a href="{{ url_for('register') }}">Register here</a>.
    </p>
  </div>
   <script>
    const togglePassword = document.querySelector("#togglePassword");
    const passwordInput = document.querySelector("#password");
    const eyeIcon = document.querySelector("#eyeIcon");

    togglePassword.addEventListener("click", function () {
      const type = passwordInput.getAttribute("type") === "password" ? "text" : "password";
      passwordInput.setAttribute("type", type);
      eyeIcon.classList.toggle("bi-eye");
      eyeIcon.classList.toggle("bi-eye-slash");
    });
  </script>

  <!-- Bootstrap JS (optional for other components) -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

  <!-- Bootstrap 5 JS -->
  <script src="{{ url_for('static', filename='js/bootstrap.bundle.js') }}"></script>
</body>
</html>
